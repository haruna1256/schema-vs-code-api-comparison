openapi: "3.0.3"

# API自体のメタデータを定義
info:
  # APIのタイトル
  title: "openapiのAPI"
  # APIの説明
  description: "openapiを使って作成した本のAPIです"
  # APIのバージョン
  version: "1.0.0"

servers:
  - url: "http://localhost:3001"
    description: "モックサーバー（Prism）"
  - url: "http://localhost:8080"
    description: "実サーバー"


# 全体のタグ一覧
# ここで定義されたタグは、各エンドポイント（paths内）に付けられる
tags:
  # タグの名前
  # 指定することで、「これは本関連の処理です」と分類
  - name: "books"
    # 何を意味するかの説明
    description: "本情報の操作"

# エンドポイント一覧
paths: 
  # APIのエンドポイント（パス）を定義
  "/books":
    # HTTPのメソットの定義
    # 本の一覧取得
    get:
      # エンドポイントの簡単な説明
      # ドキュメント表示用に使用
      summary: "本の一覧の取得"
      # タグ
      tags: ["books"]
      # このAPIが非推奨（deprecated）かどうかを示す。
      # ここでは false なので、まだ正式に使えるAPI。
      deprecated: false
      # レスポンス（返却内容）を定義
      responses:
        # ステータスコード
        "200":
          # ステータスコード 200 の説明
          description: "成功"
          # レスポンスの中身（Content-Type）を定義
          content:
            # レスポンスは JSON形式 で返される
            application/json:
              # レスポンスボディのデータ構造（スキーマ）を指定
              schema:
                # スキーマ定義を再利用している
                # 参照先
                $ref: "#/components/schemas/Books"

    # 本の新規登録
    post:
      summary: "本の新規登録"
      tags: ["books"]
      deprecated: false
      # リクエストで送る本体部分（JSONなど）を定義する
      requestBody:
        # 何を表しているかの説明
        description: "本の内容"
        # 必須かどうか
        required: true
        # 受け取る内容
        content:
          # JSON形式のデータを受け取る
          application/json:
            # 受け取るデータはオブジェクト（連想配列）である
            schema:
              $ref: "#/components/schemas/Book"

      responses:
        "201":
          description: "作成成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        # HTTPステータスコード 400 Bad Request
        # → リクエストの形式が正しくない、バリデーションエラーなどの場合
        "400":
          description: "Client side error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: "400"
                  type:
                    type: string
                    example: "BadRequest"
                  message:
                    type: string
                    example: "titleは必須です"
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: "title"
                        code:
                          type: string
                          example: "required"


  # 特定の本の詳細取得
  "/books/{id}":
    get:
      summary: "特定の本の詳細取得"
      tags: ["books"]
      deprecated: false
      # パラメータ
      parameters:
          # id という名前の パスパラメータを定義。
        - name: id
          # in: path → パス内に含まれる変数。
          in: path
          # required: true → 必須パラメータ。
          required: true
          # type: string → ユーザーIDは文字列型。
          schema: {type: string}
      responses:
        "200":
          description: "成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

    







                



# 本の新規登録 -> POST /books

# 特定の本の情報を更新 -> PUT /books/{id}

# 特定の本を削除 -> DELETE /books/{id}

# 特定の本をステータスでの絞り込み -> GET /books?status=done

# 特定の本をタグでの絞り込み -> GET /books?tags=小説






components:
  schemas:
    Book:
      type: object
      description: "本の情報を表すオブジェクト"
      properties:
        id:
          type: string
          format: uuid
          example: "a13f9c6d-b849-442a-b3d4-fb05c221d2a9"
          description: "一意な識別子"
          # 本の一意なID。UUID形式推奨。
        title:
          type: string
          example: "本のタイトル"
          description: "書籍のタイトル"
          # 本のタイトル（必須）
        author:
          type: string
          example: "著者名"
          description: "著者名"
          # 著者名（必須）
        memo:
          type: string
          nullable: true
          example: "感想やメモ（任意）"
          description: "感想やメモ（任意）"
          # 読書メモや感想など、任意のテキスト
        status:
          type: string
          enum: [unread, reading, done]
          example: "unread"
          default: "unread"
          description: "読書状況"
          # 読書の進捗状態。必須。未読/読書中/読了
        tags:
          type: array
          items:
            type: string
          example: ["小説", "エッセイ"]
          description: "タグリスト（ジャンルなど）"
          # 本に付けるタグのリスト（例：ジャンルなど）
        startedAt:
          type: string
          format: date
          nullable: true
          example: "2024-04-24"
          description: "読み始めた日（任意）"
          # 読み始めた日。日付フォーマット、任意
        finishedAt:
          type: string
          format: date
          nullable: true
          example: "2024-04-25"
          description: "読み終えた日（任意）"
          # 読み終えた日。日付フォーマット、任意
        createdAt:
          type: string
          format: date-time
          example: "2024-04-24T15:30:00Z"
          description: "登録日時"
          # レコード登録日時。日時フォーマット
      required:
        - title
        - author
        - status
        # title, author, statusは必須

    Books:
      type: array
      items:
        $ref: '#/components/schemas/Book'
      # 複数のBookオブジェクトを格納する配列
