version: '3'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./src/openapi/api:/openapi 
      - ./public:/app/public
    networks:
      - app-network

  # server:
  #   build:    
  #     context: ./codefirst
  #     dockerfile: Dockerfile
  #   ports:
  #     - "5001:5001"
  #   working_dir: /app
  #   volumes:
  #     - ./codefirst:/app
  #   networks:
  #     - app-network

  prism:
    image: stoplight/prism:4
    command: 'mock -h 0.0.0.0 /src/openapi/api/openapi.yaml'
    volumes:
      - ./src/openapi/api/openapi.yaml:/src/openapi/api/openapi.yaml:ro
    ports:
      - '3001:4010'


  grpcserver:
    build:
      context: .
      dockerfile: ./grpcserver/Dockerfile
    ports:
      - "50051:50051"
    networks:
      - app-network
  
  envoy:
    image: envoyproxy/envoy:v1.29-latest
    ports:
      - "8080:8080"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
    networks:
      - app-network
    depends_on:
      - grpcserver 

  db:
    image: mysql:8.0
    container_name: book-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: book_app
      MYSQL_USER: book_user
      MYSQL_PASSWORD: book_pass
    ports:
      - "3306:3306"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - db-data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data: